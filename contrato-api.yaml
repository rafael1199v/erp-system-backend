openapi: 3.0.3
info:
  title: Rafael API | Inventory + Sales
  version: 1.0.0
  description: Contrato unificado de las APIs de Inventario y Ventas.
servers:
- url: http://localhost:5143/
  description: Inventory.API
- url: http://localhost:5074/
  description: Sales.API
tags:
