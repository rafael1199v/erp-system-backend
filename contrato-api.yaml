- name: InventoryCompaniesContract
- name: InventoryDocumentsContract
- name: InventoryProductsContract
- name: InventorySellableProductsContract
- name: InventoryStockContract
- name: CatalogContract
- name: DashboardContract
- name: KdsContract
- name: PaymentMethodsContract
