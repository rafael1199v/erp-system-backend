      - InventoryCatalogContract
      summary: Resume indicadores de catalogo y stock
      description: |-
        Devuelve conteos agregados de productos y existencias para una empresa.
        Usar para dashboards del modulo de inventario y reportes rapidos.
        Forma parte del contrato de integracion entre servicios.
      parameters:
      - name: companyCen
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/InventoryDashboardContractDto'
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryDashboardContractDto'
            text/json:
              schema:
                $ref: '#/components/schemas/InventoryDashboardContractDto'
        '400':
          description: Bad Request
          content:
            text/plain:
              schema: {}
            application/json:
              schema: {}
            text/json:
              schema: {}
        '404':
