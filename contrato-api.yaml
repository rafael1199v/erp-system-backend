components:
  schemas:
    CategoryContractDto:
      type: object
      properties:
        categoryCen:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        isActive:
          type: boolean
    CompanyContractDto:
      type: object
      properties:
        companyCen:
          type: string
        name:
          type: string
        isActive:
          type: boolean
    CompanyLookupContractDto:
      type: object
      properties:
        companyId:
          pattern: ^-?(?:0|[1-9]\d*)$
          type: integer
          format: int32
        companyCen:
          type: string
        name:
          type: string
    CreateCategoryContractRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
    CreateProductContractRequest:
      type: object
      properties:
        sku:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        categoryCen:
          type: string
        unitCen:
          type: string
        salePrice:
          pattern: ^-?(?:0|[1-9]\d*)(?:\.\d+)?$
          type: number
          format: double
        costPrice:
          pattern: ^-?(?:0|[1-9]\d*)(?:\.\d+)?$
          type: number
          format: double
          nullable: true
        reorderLevel:
          pattern: ^-?(?:0|[1-9]\d*)(?:\.\d+)?$
          type: number
          format: double
        stationCode:
          type: string
          nullable: true
    CreateProductContractResponse:
      type: object
      properties:
        productCen:
          type: string
        sku:
          type: string
        name:
          type: string
        status:
          type: string
        initialStock:
          pattern: ^-?(?:0|[1-9]\d*)(?:\.\d+)?$
          type: number
          format: double
    CreateUnitContractRequest:
      type: object
      properties:
        name:
          type: string
        abbreviation:
          type: string
          nullable: true
    GeneratedMovementContractDto:
      type: object
      properties:
        movementCen:
          type: string
        productCen:
          type: string
        warehouseCen:
          type: string
        quantity:
          pattern: ^-?(?:0|[1-9]\d*)(?:\.\d+)?$
          type: number
          format: double
        movementType:
          type: string
    InventoryAdjustmentContractRequest:
      type: object
      properties:
        warehouseCen:
          type: string
        reason:
          type: string
        lines:
          type: array
          items:
            $ref: '#/components/schemas/InventoryAdjustmentLineContractRequest'
    InventoryAdjustmentContractResponse:
      type: object
      properties:
        adjustmentCen:
          type: string
        status:
          type: string
        generatedMovements:
          type: array
          items:
            $ref: '#/components/schemas/GeneratedMovementContractDto'
    InventoryAdjustmentLineContractRequest:
      type: object
      properties:
        productCen:
          type: string
        quantity:
          pattern: ^-?(?:0|[1-9]\d*)(?:\.\d+)?$
          type: number
          format: double
        adjustmentType:
          type: string
    InventoryDashboardContractDto:
      type: object
      properties:
        companyCen:
          type: string
        totalProducts:
          pattern: ^-?(?:0|[1-9]\d*)$
          type: integer
          format: int32
        totalStockQuantity:
          pattern: ^-?(?:0|[1-9]\d*)(?:\.\d+)?$
          type: number
          format: double
        lowStockCount:
          pattern: ^-?(?:0|[1-9]\d*)$
          type: integer
          format: int32
        outOfStockCount:
          pattern: ^-?(?:0|[1-9]\d*)$
          type: integer
          format: int32
    InventoryDocumentContractDto:
      type: object
      properties:
        documentCen:
          type: string
        documentType:
          type: string
        status:
          type: string
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        totalItems:
          pattern: ^-?(?:0|[1-9]\d*)$
          type: integer
          format: int32
